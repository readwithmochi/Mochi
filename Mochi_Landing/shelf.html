<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochi — My Shelf</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #FFFFFF;
            --surface: #FFFFFF;
            --pink-soft: #FAE8EF;
            --pink-light: #F5C9D6;
            --pink: #E8A0B4;
            --pink-deep: #C97A8E;
            --text: #4A3040;
            --text-muted: #9B7B8A;
            --border: #F0DDE5;
        }

        body {
            background-color: #FDF8FA;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header ── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1.5px solid var(--border);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-bunny { font-size: 1.4rem; line-height: 1; }
        .logo-wordmark {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--pink-deep);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        nav { display: flex; gap: 4px; }
        nav a {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            padding: 7px 14px;
            border-radius: 10px;
            transition: all 0.2s;
        }
        nav a:hover, nav a.active { background: var(--pink-soft); color: var(--pink-deep); }

        /* ── Page hero ── */
        .page-hero {
            max-width: 1100px;
            margin: 0 auto;
            padding: 52px 40px 28px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.9rem, 4vw, 2.7rem);
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .page-hero h1 em { color: var(--pink-deep); font-style: italic; }
        .page-hero p { color: var(--text-muted); font-size: 0.93rem; }

        .hero-right { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }

        /* ── Stats ── */
        .stats { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
        .stat-pill {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 100px;
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .stat-pill span { color: var(--pink-deep); }

        /* ── Add Book Button ── */
        .btn-add-book {
            background: var(--pink-deep);
            color: #fff;
            border: none;
            border-radius: 100px;
            padding: 10px 22px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-add-book:hover {
            background: #b8697d;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(201,122,142,0.35);
        }

        /* ── Filters ── */
        .filters {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px 32px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 100px;
            padding: 7px 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--pink);
            border-color: var(--pink);
            color: #fff;
        }

        /* ── Divider ── */
        .divider { max-width: 1100px; margin: 0 auto 32px; padding: 0 40px; border-top: 1.5px solid var(--border); }

        /* ── Shelf grid ── */
        .shelf {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 40px 120px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 28px;
        }

        /* ── Empty state ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
        }
        .empty-emoji { font-size: 3rem; display: block; margin-bottom: 16px; }
        .empty-state h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--text);
        }
        .empty-state p { color: var(--text-muted); font-size: 0.87rem; }

        /* ── Book card ── */
        .book-card { display: flex; flex-direction: column; gap: 12px; cursor: pointer; }
        .book-card:hover .book-cover-wrap {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(74,48,64,0.18);
        }

        .book-cover-wrap {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 2/3;
            box-shadow: 0 6px 24px rgba(74,48,64,0.12);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            background: var(--pink-soft);
        }
        .book-cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .book-cover-fallback {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 14px;
            text-align: center;
        }
        .fb-title { font-family: 'Playfair Display', serif; font-size: 0.85rem; font-weight: 700; line-height: 1.35; color: #fff; margin-bottom: 8px; }
        .fb-author { font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.72); }

        .status-badge {
            position: absolute;
            top: 9px; right: 9px;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            padding: 4px 9px;
            border-radius: 100px;
            background: rgba(255,255,255,0.93);
            color: var(--pink-deep);
            backdrop-filter: blur(4px);
        }

        .rating-badge {
            position: absolute;
            bottom: 9px; left: 9px;
            font-size: 0.7rem;
            background: rgba(255,255,255,0.93);
            border-radius: 100px;
            padding: 3px 9px;
            backdrop-filter: blur(4px);
            letter-spacing: 1px;
        }

        .fave-btn {
            position: absolute;
            top: 9px; left: 9px;
            background: rgba(255,255,255,0.93);
            border: none;
            border-radius: 50%;
            width: 28px; height: 28px;
            font-size: 0.9rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, transform 0.15s;
            backdrop-filter: blur(4px);
            color: var(--pink-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        .book-card:hover .fave-btn,
        .book-card.is-fave .fave-btn { opacity: 1; }
        .fave-btn:hover { transform: scale(1.2); }

        .book-info { display: flex; flex-direction: column; gap: 5px; }
        .book-title { font-family: 'Playfair Display', serif; font-size: 0.9rem; font-weight: 700; color: var(--text); line-height: 1.3; }
        .book-author { font-size: 0.76rem; color: var(--text-muted); font-weight: 500; }
        .book-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
        .tag {
            font-size: 0.66rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 100px;
            background: var(--pink-soft);
            color: var(--pink-deep);
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        /* ── Cover loader ── */
        .cover-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--pink-soft); }
        .cover-loading::after { content: '🐰'; font-size: 1.8rem; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } }

        /* ── Pet corner ── */
        .pet-corner {
            position: fixed;
            bottom: 28px; right: 28px;
            z-index: 50;
            background: var(--surface);
            border: 1.5px solid var(--pink-light);
            border-radius: 20px;
            padding: 14px 18px;
            box-shadow: 0 8px 32px rgba(232,160,180,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 220px;
            animation: pet-float 4s ease-in-out infinite;
        }
        @keyframes pet-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .pet-emoji { font-size: 2rem; }
        .pet-message { font-size: 0.74rem; color: var(--text-muted); line-height: 1.5; }
        .pet-message strong { display: block; color: var(--text); font-size: 0.77rem; }

        /* ── Modal overlay ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(74,48,64,0.5);
            backdrop-filter: blur(6px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: all; }

        .modal {
            background: var(--surface);
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            max-height: 88vh;
            overflow-y: auto;
            box-shadow: 0 24px 80px rgba(74,48,64,0.22);
            transform: translateY(24px) scale(0.98);
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
            position: relative;
        }
        .modal-overlay.open .modal { transform: translateY(0) scale(1); }

        .modal-detail { max-width: 540px; }

        .modal-header {
            padding: 26px 26px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .modal-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: var(--text); }
        .modal-close {
            background: var(--pink-soft);
            border: none;
            border-radius: 50%;
            width: 32px; height: 32px;
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--text-muted);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .modal-close:hover { background: var(--pink-light); color: var(--text); }

        .modal-body { padding: 16px 26px 26px; }

        /* ── Search ── */
        .search-wrap { position: relative; margin-bottom: 14px; }
        .search-wrap input {
            width: 100%;
            background: var(--pink-soft);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px 12px 42px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }
        .search-wrap input::placeholder { color: var(--text-muted); }
        .search-wrap input:focus { border-color: var(--pink); }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }

        .search-results { display: flex; flex-direction: column; gap: 6px; max-height: 340px; overflow-y: auto; }
        .search-result {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s;
            border: 1.5px solid transparent;
        }
        .search-result:hover { background: var(--pink-soft); border-color: var(--pink-light); }
        .search-result-cover {
            width: 36px; height: 54px;
            border-radius: 6px;
            object-fit: cover;
            background: var(--pink-soft);
            flex-shrink: 0;
        }
        .search-result-cover.no-img { display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .search-result-title { font-family: 'Playfair Display', serif; font-size: 0.87rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .search-result-author { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
        .search-hint { text-align: center; padding: 32px 20px; color: var(--text-muted); font-size: 0.85rem; }
        .search-hint .hint-emoji { font-size: 2rem; display: block; margin-bottom: 10px; }

        /* ── Add book form ── */
        .add-book-form { display: none; }
        .add-book-form.visible { display: block; }

        .selected-book-preview {
            display: flex; align-items: center; gap: 14px;
            background: var(--pink-soft);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 20px;
        }
        .selected-book-cover {
            width: 46px; height: 68px;
            border-radius: 8px;
            object-fit: cover;
            background: var(--pink-light);
            flex-shrink: 0;
        }
        .selected-book-cover.fallback { display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .stitle { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700; color: var(--text); }
        .sauthor { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }

        .form-group { margin-bottom: 18px; }
        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 8px;
        }
        .form-label-note { font-weight: 400; text-transform: none; letter-spacing: 0; }

        /* ── Status selector ── */
        .status-options { display: flex; gap: 8px; }
        .status-option {
            flex: 1;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 10px 6px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            line-height: 1.4;
        }
        .status-option:hover { border-color: var(--pink); color: var(--pink-deep); }
        .status-option.selected { background: var(--pink-soft); border-color: var(--pink); color: var(--pink-deep); }

        /* ── Star rating ── */
        .star-rating { display: flex; gap: 4px; }
        .star-rating .star {
            font-size: 1.5rem;
            color: var(--border);
            cursor: pointer;
            transition: color 0.15s, transform 0.1s;
            user-select: none;
            line-height: 1;
        }
        .star-rating .star.lit { color: var(--pink-deep); }
        .star-rating .star:hover { transform: scale(1.2); }

        /* ── Tag input ── */
        .tag-input-wrap {
            display: flex; flex-wrap: wrap; gap: 6px;
            background: var(--pink-soft);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            min-height: 44px;
            transition: border-color 0.2s;
            cursor: text;
            align-items: center;
        }
        .tag-input-wrap:focus-within { border-color: var(--pink); }
        .tag-remove {
            background: none; border: none; cursor: pointer;
            color: var(--pink-deep); font-size: 0.65rem; padding: 0; line-height: 1; opacity: 0.7;
        }
        .tag-remove:hover { opacity: 1; }
        .tag-input {
            border: none; background: transparent;
            font-family: 'Nunito', sans-serif;
            font-size: 0.82rem; color: var(--text);
            outline: none; min-width: 80px; flex: 1;
        }
        .tag-input::placeholder { color: var(--text-muted); }

        /* ── Textarea ── */
        .notes-input {
            width: 100%;
            background: var(--pink-soft);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.87rem;
            color: var(--text);
            outline: none; resize: none;
            min-height: 80px;
            transition: border-color 0.2s;
        }
        .notes-input::placeholder { color: var(--text-muted); }
        .notes-input:focus { border-color: var(--pink); }
        .date-input {
            width: 100%;
            background: var(--pink-soft);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 11px 14px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.87rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }
        .date-input:focus { border-color: var(--pink); }

        /* ── Buttons ── */
        .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
        .btn-primary {
            flex: 1;
            background: var(--pink-deep); color: #fff;
            border: none; border-radius: 14px;
            padding: 14px;
            font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-primary:hover { background: #b8697d; }
        .btn-ghost {
            background: var(--pink-soft); color: var(--text-muted);
            border: none; border-radius: 14px;
            padding: 14px 18px;
            font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-ghost:hover { background: var(--pink-light); color: var(--text); }
        .btn-danger {
            background: #FFF0F0; color: #C05050;
            border: none; border-radius: 14px;
            padding: 14px 18px;
            font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-danger:hover { background: #FFE0E0; }

        /* ── Detail modal layout ── */
        .detail-layout { display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start; }
        .detail-cover-img {
            width: 96px; height: 144px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 6px 20px rgba(74,48,64,0.15);
        }
        .detail-cover-fallback {
            width: 96px; height: 144px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            padding: 12px; text-align: center;
        }
        .detail-cover-fallback span { font-family: 'Playfair Display', serif; font-size: 0.8rem; color: #fff; line-height: 1.3; }
        .detail-meta { flex: 1; min-width: 0; }
        .detail-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 5px; }
        .detail-author { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 14px; }
        .detail-status-options { display: flex; gap: 6px; flex-wrap: wrap; }
        .detail-status-option {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.72rem; font-weight: 700;
            color: var(--text-muted);
            cursor: pointer; transition: all 0.2s;
        }
        .detail-status-option:hover { border-color: var(--pink); color: var(--pink-deep); }
        .detail-status-option.selected { background: var(--pink-soft); border-color: var(--pink); color: var(--pink-deep); }

        /* ── Reading goal ── */
        .goal-wrap { max-width: 1100px; margin: 0 auto; padding: 0 40px 24px; }
        .goal-set-btn {
            background: none; border: 1.5px dashed var(--pink-light);
            border-radius: 100px; padding: 9px 20px;
            font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 700;
            color: var(--text-muted); cursor: pointer; transition: all 0.2s;
        }
        .goal-set-btn:hover { border-color: var(--pink); color: var(--pink-deep); }
        .goal-bar-wrap { display: flex; flex-direction: column; gap: 8px; }
        .goal-info { display: flex; align-items: center; font-size: 0.82rem; font-weight: 700; }
        .goal-label { color: var(--text-muted); }
        .goal-fraction { color: var(--pink-deep); margin-left: auto; }
        .goal-edit-btn {
            background: none; border: none; cursor: pointer; padding: 0 0 0 8px;
            font-size: 0.85rem; color: var(--text-muted); opacity: 0.6;
            line-height: 1; transition: opacity 0.2s;
        }
        .goal-edit-btn:hover { opacity: 1; }
        .goal-track { height: 8px; background: var(--pink-soft); border-radius: 100px; overflow: hidden; }
        .goal-fill {
            height: 100%; background: linear-gradient(90deg, var(--pink), var(--pink-deep));
            border-radius: 100px; transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1); min-width: 4px;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            header { padding: 14px 18px; }
            nav a { padding: 6px 10px; font-size: 0.8rem; }
            .page-hero { padding: 32px 20px 20px; }
            .goal-wrap { padding: 0 20px 16px; }
            .filters { padding: 0 20px 24px; }
            .shelf { padding: 0 20px 100px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 18px; }
            .pet-corner { bottom: 14px; right: 14px; }
            .status-options { flex-direction: column; }
            .detail-layout { flex-direction: column; align-items: center; text-align: center; }
            .detail-status-options { justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <span class="logo-bunny">🐰</span>
        <span class="logo-wordmark">Mochi</span>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="mochi.js"></script>
<script>
// ──────────────────────────────────────────
// Data
// ──────────────────────────────────────────
const FALLBACK_COLORS = [
    'linear-gradient(145deg,#2C2C3E,#1A1A2E)',
    'linear-gradient(145deg,#4A7B9D,#2C5F7A)',
    'linear-gradient(145deg,#8B1A1A,#5C0E0E)',
    'linear-gradient(145deg,#C4782A,#8B5210)',
    'linear-gradient(145deg,#1E3A5F,#0F2240)',
    'linear-gradient(145deg,#2D6A4F,#1B4332)',
    'linear-gradient(145deg,#6B3FA0,#3D1D6E)',
    'linear-gradient(145deg,#5C4033,#3E2723)',
    'linear-gradient(145deg,#37474F,#263238)',
    'linear-gradient(145deg,#880E4F,#560027)',
];

function getBooks() { return window.mochiGetBooks(); }

function generateId() {
    return 'book_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
}

function randomFallback() {
    return FALLBACK_COLORS[Math.floor(Math.random() * FALLBACK_COLORS.length)];
}

// ──────────────────────────────────────────
// Open Library
// ──────────────────────────────────────────
async function fetchCoverUrl(title, author, coverId) {
    if (coverId) return `https://covers.openlibrary.org/b/id/${coverId}-L.jpg`;
    try {
        const q = encodeURIComponent(`${title} ${author}`);
        const res = await fetch(`https://openlibrary.org/search.json?q=${q}&limit=1&fields=cover_i`);
        const data = await res.json();
        if (data.docs?.[0]?.cover_i) {
            return `https://covers.openlibrary.org/b/id/${data.docs[0].cover_i}-L.jpg`;
        }
    } catch (_) {}
    return null;
}

async function searchOpenLibrary(query) {
    const q = encodeURIComponent(query);
    const res = await fetch(`https://openlibrary.org/search.json?q=${q}&limit=8&fields=key,title,author_name,cover_i,number_of_pages_median`);
    const data = await res.json();
    return (data.docs || []).map(d => ({
        title: d.title,
        author: (d.author_name || ['Unknown'])[0],
        coverId: d.cover_i || null,
        pageCount: d.number_of_pages_median || null,
    }));
}

// ──────────────────────────────────────────
// Render
// ──────────────────────────────────────────
let activeFilter = 'all';

const STATUS_LABELS = { read:'Read ✓', reading:'Reading 📖', want:'Want to read 🌙' };

function filterBooks(books, filter) {
    if (filter === 'all') return books;
    if (filter === 'read') return books.filter(b => b.status === 'read');
    if (filter === 'reading') return books.filter(b => b.status === 'reading');
    if (filter === 'want') return books.filter(b => b.status === 'want');
    if (filter === 'faves') return books.filter(b => b.favourite);
    const f = filter.toLowerCase();
    return books.filter(b =>
        b.author.toLowerCase().includes(f) ||
        b.tags.some(t => t.toLowerCase().replace(/[^\w\s]/g,'').trim().includes(f))
    );
}

function renderStats(books) {
    const total = books.length;
    const read = books.filter(b => b.status === 'read').length;
    const reading = books.filter(b => b.status === 'reading').length;
    document.getElementById('stats').innerHTML = `
        <div class="stat-pill"><span>${total}</span> books</div>
        <div class="stat-pill"><span>${read}</span> read</div>
        ${reading ? `<div class="stat-pill"><span>${reading}</span> reading now</div>` : ''}
        ${calculateStreak(books) > 0 ? `<div class="stat-pill">streak <span>✦ ${calculateStreak(books)} day${calculateStreak(books) !== 1 ? 's' : ''}</span></div>` : ''}
    `;
}

function renderFilters(books) {
    const core = [
        { key:'all', label:'All' },
        { key:'read', label:'Read ✓' },
        { key:'reading', label:'Reading now' },
        { key:'want', label:'Want to read' },
        { key:'faves', label:'Favourites ♡' },
    ];

    const authors = [...new Set(books.map(b => b.author))].map(a => ({ key: a, label: a }));

    const tagCount = {};
    books.forEach(b => b.tags.forEach(t => {
        const k = t.toLowerCase().replace(/[^\w\s]/g,'').trim();
        tagCount[k] = (tagCount[k] || 0) + 1;
    }));
    const topTags = Object.entries(tagCount)
        .sort(([,a],[,b]) => b - a).slice(0, 4)
        .map(([k]) => {
            const orig = books.flatMap(b => b.tags).find(t => t.toLowerCase().replace(/[^\w\s]/g,'').trim() === k) || k;
            return { key: k, label: orig };
        });

    const all = [...core, ...authors, ...topTags];
    document.getElementById('filters').innerHTML = all.map(f =>
        `<button class="filter-btn${activeFilter === f.key ? ' active' : ''}" data-filter="${f.key}">${f.label}</button>`
    ).join('');

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            activeFilter = btn.dataset.filter;
            renderShelf();
        });
    });
}

function updatePetMessage(books) {
    const reading = books.filter(b => b.status === 'reading');
    const read = books.filter(b => b.status === 'read');
    let msg;
    if (reading.length > 0) {
        msg = `How's <em>${reading[0].title}</em> going? 📖`;
    } else if (read.length >= 5) {
        msg = `${read.length} books read — you're amazing! 🌸`;
    } else if (books.length === 0) {
        msg = 'Add your first book! ✨';
    } else {
        msg = 'Keep reading, bestie! 🐰';
    }
    document.getElementById('petMessage').innerHTML = `<strong>Mochi says...</strong> ${msg}`;
}

function renderShelf() {
    const books = getBooks();
    renderStats(books);
    renderFilters(books);
    updatePetMessage(books);

    const filtered = filterBooks(books, activeFilter);
    const shelf = document.getElementById('shelf');
    shelf.innerHTML = '';

    if (filtered.length === 0) {
        shelf.innerHTML = `<div class="empty-state">
            <span class="empty-emoji">🌸</span>
            <h3>Nothing here yet</h3>
            <p>Try a different filter, or add more books to your shelf.</p>
        </div>`;
        return;
    }

    filtered.forEach(book => shelf.appendChild(createBookCard(book)));
}

function createBookCard(book) {
    const card = document.createElement('div');
    card.className = `book-card${book.favourite ? ' is-fave' : ''}`;
    card.dataset.id = book.id;

    const tagsHTML = book.tags.slice(0,3).map(t => `<span class="tag">${t}</span>`).join('');
    const ratingBadge = book.rating ? `<span class="rating-badge">${'⭐'.repeat(book.rating)}</span>` : '';

    card.innerHTML = `
        <div class="book-cover-wrap">
            <div class="cover-loading"></div>
            <img style="display:none" alt="${book.title} cover">
            <div class="book-cover-fallback" style="background:${book.fallbackColor}">
                <span class="fb-title">${book.title}</span>
                <span class="fb-author">${book.author}</span>
            </div>
            <button class="fave-btn" title="Favourite">${book.favourite ? '♥' : '♡'}</button>
            <span class="status-badge">${STATUS_LABELS[book.status]}</span>
            ${ratingBadge}
        </div>
        <div class="book-info">
            <span class="book-title">${book.title}</span>
            <span class="book-author">${book.author}</span>
            <div class="book-tags">${tagsHTML}</div>
        </div>
    `;

    const img = card.querySelector('img');
    const fallback = card.querySelector('.book-cover-fallback');
    const loader = card.querySelector('.cover-loading');

    fetchCoverUrl(book.title, book.author, book.coverId).then(url => {
        loader.remove();
        if (url) {
            img.src = url;
            img.style.display = 'block';
            img.onerror = () => { img.style.display = 'none'; fallback.style.display = 'flex'; };
        } else {
            fallback.style.display = 'flex';
        }
    });

    card.querySelector('.fave-btn').addEventListener('click', e => {
        e.stopPropagation();
        const books = getBooks();
        const b = books.find(x => x.id === book.id);
        if (b) { b.favourite = !b.favourite; window.mochiUpdateBook(b); renderShelf(); }
    });

    card.addEventListener('click', () => {
        sessionStorage.setItem('mochiCurrentBook', JSON.stringify(book));
        window.location.href = 'scrapbook.html?id=' + book.id;
    });
    return card;
}

// ──────────────────────────────────────────
// Add Book Modal
// ──────────────────────────────────────────
let selectedBook = null;
let addRating = 0;
let addTags = [];
let searchTimer = null;

function openAddModal() {
    selectedBook = null;
    addRating = 0;
    addTags = [];
    document.getElementById('bookSearchInput').value = '';
    document.getElementById('searchResults').innerHTML = `<div class="search-hint"><span class="hint-emoji">📖</span>Start typing to find your book</div>`;
    document.getElementById('addBookForm').classList.remove('visible');
    document.getElementById('searchStep').style.display = 'block';
    document.getElementById('addModalTitle').textContent = 'Add a book 📚';
    document.getElementById('addNotes').value = '';
    document.querySelectorAll('#addStatusOptions .status-option').forEach(b => b.classList.remove('selected'));
    document.querySelector('#addStatusOptions [data-status="read"]').classList.add('selected');
    document.getElementById('ratingGroup').style.display = 'block';
    document.getElementById('notesGroup').style.display = 'block';
    updateAddStars(0);
    renderAddTags();
    document.getElementById('addModalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('bookSearchInput').focus(), 150);
}

function closeAddModal() {
    document.getElementById('addModalOverlay').classList.remove('open');
}

function updateAddStars(n) {
    addRating = n;
    document.querySelectorAll('#addStarRating .star').forEach((s, i) => s.classList.toggle('lit', i < n));
}

function renderAddTags() {
    const wrap = document.getElementById('addTagWrap');
    const input = document.getElementById('addTagInput');
    wrap.querySelectorAll('.tag').forEach(t => t.remove());
    addTags.forEach((tag, idx) => {
        const pill = document.createElement('span');
        pill.className = 'tag';
        pill.innerHTML = `${tag} <button class="tag-remove" data-idx="${idx}">✕</button>`;
        pill.querySelector('.tag-remove').addEventListener('click', () => {
            addTags.splice(idx, 1);
            renderAddTags();
        });
        wrap.insertBefore(pill, input);
    });
}

async function performSearch(query) {
    const el = document.getElementById('searchResults');
    if (!query.trim()) {
        el.innerHTML = `<div class="search-hint"><span class="hint-emoji">📖</span>Start typing to find your book</div>`;
        return;
    }
    el.innerHTML = `<div class="search-hint"><span class="hint-emoji">🐰</span>Searching...</div>`;
    try {
        const results = await searchOpenLibrary(query);
        if (!results.length) {
            el.innerHTML = `<div class="search-hint"><span class="hint-emoji">😢</span>No results found — try a different search</div>`;
            return;
        }
        el.innerHTML = results.map((r, i) => {
            const coverHTML = r.coverId
                ? `<img class="search-result-cover" src="https://covers.openlibrary.org/b/id/${r.coverId}-S.jpg" alt="${r.title}">`
                : `<div class="search-result-cover no-img">📚</div>`;
            return `<div class="search-result" data-idx="${i}">
                ${coverHTML}
                <div>
                    <div class="search-result-title">${r.title}</div>
                    <div class="search-result-author">${r.author}</div>
                </div>
            </div>`;
        }).join('');
        el.querySelectorAll('.search-result').forEach((el, i) => {
            el.addEventListener('click', () => selectBook(results[i]));
        });
    } catch (_) {
        el.innerHTML = `<div class="search-hint"><span class="hint-emoji">😓</span>Something went wrong — try again</div>`;
    }
}

function todayValue() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function syncAddFormFields(status) {
    const isRead    = status === 'read';
    const isReading = status === 'reading';
    document.getElementById('dateStartedGroup').style.display  = (isRead || isReading) ? 'block' : 'none';
    document.getElementById('dateFinishedGroup').style.display = isRead ? 'block' : 'none';
    document.getElementById('ratingGroup').style.display       = isRead ? 'block' : 'none';
    document.getElementById('notesGroup').style.display        = isRead ? 'block' : 'none';
    const today = todayValue();
    document.getElementById('addDateStarted').max  = today;
    document.getElementById('addDateFinished').max = today;
}

function selectBook(book) {
    selectedBook = book;
    const coverHTML = book.coverId
        ? `<img class="selected-book-cover" src="https://covers.openlibrary.org/b/id/${book.coverId}-M.jpg" alt="${book.title}">`
        : `<div class="selected-book-cover fallback" style="background:${randomFallback()}">📚</div>`;
    document.getElementById('selectedBookPreview').innerHTML = `
        ${coverHTML}
        <div>
            <div class="stitle">${book.title}</div>
            <div class="sauthor">${book.author}</div>
        </div>
    `;
    document.getElementById('searchStep').style.display = 'none';
    document.getElementById('addBookForm').classList.add('visible');
    document.getElementById('addModalTitle').textContent = 'Add details ✨';
    // Sync field visibility to whatever status is currently selected
    const statusEl = document.querySelector('#addStatusOptions .status-option.selected');
    syncAddFormFields(statusEl ? statusEl.dataset.status : 'read');
}

function submitAddBook() {
    if (!selectedBook) return;
    const statusEl = document.querySelector('#addStatusOptions .status-option.selected');
    const status = statusEl ? statusEl.dataset.status : 'want';
    const dateStartedVal = document.getElementById('addDateStarted').value;
    const dateFinishedVal = document.getElementById('addDateFinished').value;
    const newBook = {
        id: generateId(),
        title: selectedBook.title,
        author: selectedBook.author,
        status,
        rating: status === 'read' ? addRating : null,
        tags: [...addTags],
        notes: document.getElementById('addNotes').value.trim(),
        favourite: false,
        coverId: selectedBook.coverId,
        pageCount: selectedBook.pageCount || null,
        fallbackColor: randomFallback(),
        dateAdded: Date.now(),
        dateStarted: dateStartedVal ? new Date(dateStartedVal).getTime() : null,
        dateFinished: dateFinishedVal ? new Date(dateFinishedVal).getTime() : (status === 'read' ? Date.now() : null),
    };
    const books = getBooks();
    books.unshift(newBook);
    closeAddModal();
    activeFilter = 'all';
    renderShelf();
    renderGoal();

    window.mochiInsertBook(newBook).catch(err => {
        console.error('Insert failed:', err);
        alert('Your book was added to your shelf but could not be saved. Make sure you are logged in and try again.\n\nError: ' + (err.message || err));
        // Roll back the in-memory add so the shelf isn't out of sync
        const idx = books.findIndex(b => b.id === newBook.id);
        if (idx !== -1) books.splice(idx, 1);
        renderShelf();
        renderGoal();
    });
}

// ──────────────────────────────────────────
// Streak
// ──────────────────────────────────────────
function calculateStreak(books) {
    const readDates = books
        .filter(b => b.status === 'reading' || b.status === 'read')
        .map(b => b.dateStarted || b.dateAdded)
        .filter(Boolean)
        .map(ts => {
            const d = new Date(ts);
            return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
        });

    if (!readDates.length) return 0;

    const unique = [...new Set(readDates)].sort((a, b) => b - a);
    const today = new Date();
    const todayTs = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
    const yesterdayTs = todayTs - 86400000;

    if (unique[0] !== todayTs && unique[0] !== yesterdayTs) return 0;

    let streak = 1;
    for (let i = 1; i < unique.length; i++) {
        if (unique[i - 1] - unique[i] === 86400000) streak++;
        else break;
    }
    return streak;
}

// ──────────────────────────────────────────
// Reading Goal
// ──────────────────────────────────────────
function renderGoal() {
    const wrap = document.getElementById('goalWrap');
    if (!wrap) return;
    const goal = window.mochiGetGoal();
    const books = getBooks();
    const thisYear = new Date().getFullYear();
    const readCount = books.filter(b => {
        if (b.status !== 'read') return false;
        const ts = b.dateFinished || b.dateAdded;
        if (!ts) return false;
        return new Date(ts).getFullYear() === thisYear;
    }).length;

    if (!goal) {
        wrap.innerHTML = `<button class="goal-set-btn" id="goalSetBtn">+ Set a reading goal for ${new Date().getFullYear()}</button>`;
        document.getElementById('goalSetBtn').addEventListener('click', promptSetGoal);
        return;
    }

    const pct = Math.min(100, Math.round((readCount / goal) * 100));
    wrap.innerHTML = `
        <div class="goal-bar-wrap">
            <div class="goal-info">
                <span class="goal-label">📖 ${new Date().getFullYear()} reading goal</span>
                <span class="goal-fraction">${readCount} / ${goal}</span>
                <button class="goal-edit-btn" id="goalSetBtn" title="Change goal">✏️</button>
            </div>
            <div class="goal-track"><div class="goal-fill" style="width:${pct}%"></div></div>
        </div>
    `;
    document.getElementById('goalSetBtn').addEventListener('click', promptSetGoal);
}

async function promptSetGoal() {
    const current = window.mochiGetGoal();
    const val = prompt(current
        ? `Update your ${new Date().getFullYear()} reading goal (currently ${current}):`
        : `How many books do you want to read in ${new Date().getFullYear()}?`
    );
    if (val === null) return;
    const count = parseInt(val);
    if (!count || count < 1) return;
    await window.mochiSetGoal(count);
    renderGoal();
}

// ──────────────────────────────────────────
// Event wiring
// ──────────────────────────────────────────
document.getElementById('openAddModal').addEventListener('click', openAddModal);
document.getElementById('closeAddModal').addEventListener('click', closeAddModal);

document.getElementById('addModalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('addModalOverlay')) closeAddModal();
});

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeAddModal();
});

document.getElementById('bookSearchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => performSearch(e.target.value), 350);
});

document.querySelectorAll('#addStatusOptions .status-option').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#addStatusOptions .status-option').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        syncAddFormFields(btn.dataset.status);
    });
});

document.querySelectorAll('#addStarRating .star').forEach(star => {
    star.addEventListener('click', () => updateAddStars(parseInt(star.dataset.star)));
});

document.getElementById('addTagInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const val = e.target.value.trim().replace(/,$/,'');
        if (val && !addTags.includes(val)) { addTags.push(val); renderAddTags(); }
        e.target.value = '';
    }
});

document.getElementById('backToSearch').addEventListener('click', () => {
    document.getElementById('addBookForm').classList.remove('visible');
    document.getElementById('searchStep').style.display = 'block';
    document.getElementById('addModalTitle').textContent = 'Add a book 📚';
});

document.getElementById('submitAddBook').addEventListener('click', submitAddBook);

// ──────────────────────────────────────────
// Init
// ──────────────────────────────────────────
window.initMochi(() => {
    const user = window.mochiGetUser();
    const nickname = user?.user_metadata?.nickname;
    const displayName = nickname || (user?.email ? user.email.split('@')[0] : 'Your');
    document.getElementById('shelfHeroName').textContent = displayName + "'s";
    renderShelf();
    renderGoal();
});
</script>
