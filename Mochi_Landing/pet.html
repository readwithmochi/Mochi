<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochi — My Pet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --pink-soft: #FAE8EF;
            --pink-light: #F5C9D6;
            --pink: #E8A0B4;
            --pink-deep: #C97A8E;
            --text: #4A3040;
            --text-muted: #9B7B8A;
            --border: #F0DDE5;
            --surface: #FFFFFF;
        }

        body {
            background: #FDF8FA;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(14px);
            border-bottom: 1.5px solid var(--border);
            padding: 15px 40px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-bunny { font-size: 1.4rem; }
        .logo-wordmark { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--pink-deep); font-weight: 700; }
        nav { display: flex; gap: 4px; }
        nav a { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-decoration: none; padding: 7px 14px; border-radius: 10px; transition: all 0.2s; }
        nav a:hover, nav a.active { background: var(--pink-soft); color: var(--pink-deep); }

        /* ── Page ── */
        .pet-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 44px 24px 100px;
        }

        .page-heading {
            text-align: center;
            margin-bottom: 32px;
        }
        .page-heading h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            margin-bottom: 6px;
        }
        .page-heading h1 em { color: var(--pink-deep); font-style: italic; }
        .page-heading p { color: var(--text-muted); font-size: 0.9rem; }

        /* ── Room scene ── */
        .room-scene {
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(74,48,64,0.14);
            position: relative;
            user-select: none;
        }

        /* Wall */
        .room-wall {
            position: relative;
            background: #FEF0E8;
            height: 360px;
            overflow: hidden;
        }

        /* Dado rail line near bottom of wall */
        .room-wall::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: #FAE8DC;
            border-top: 2.5px solid #EDCFBC;
        }

        /* Floor */
        .room-floor {
            height: 80px;
            background: linear-gradient(to bottom, #DDB882, #C9A06A);
            position: relative;
        }
        /* Floorboards */
        .room-floor::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent 0,
                transparent calc(16.666% - 1px),
                rgba(0,0,0,0.08) calc(16.666% - 1px),
                rgba(0,0,0,0.08) 16.666%
            );
        }

        /* ── Window ── */
        .window {
            position: absolute;
            top: 22px;
            left: 50%; transform: translateX(-50%);
            width: 178px;
            z-index: 4;
        }

        .window-frame {
            background: #C4956A;
            border-radius: 10px 10px 4px 4px;
            padding: 7px;
            box-shadow: 0 6px 20px rgba(74,48,64,0.12);
        }

        .window-glass {
            position: relative;
            background: linear-gradient(160deg, #C8E8FF 0%, #D8EEFF 40%, #E8F4FF 100%);
            border-radius: 4px;
            height: 140px;
            overflow: hidden;
        }

        /* Window cross bars */
        .window-glass::before {
            content: '';
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 5px; background: #C4956A;
            transform: translateX(-50%);
            z-index: 2;
        }
        .window-glass::after {
            content: '';
            position: absolute;
            top: 48%; left: 0; right: 0;
            height: 5px; background: #C4956A;
            z-index: 2;
        }

        /* Sky in window */
        .window-sky { position: absolute; inset: 0; }
        .cloud { position: absolute; background: #fff; border-radius: 50px; opacity: 0.85; }
        .cloud-1 { width: 48px; height: 16px; top: 20px; left: 8px; animation: drift 12s linear infinite; }
        .cloud-2 { width: 34px; height: 12px; top: 36px; right: 10px; animation: drift 16s linear infinite reverse; }
        .cloud-3 { width: 24px; height: 9px; top: 14px; left: 55px; animation: drift 20s linear infinite; }
        @keyframes drift { 0%,100% { transform: translateX(0); } 50% { transform: translateX(6px); } }

        .sun {
            position: absolute;
            width: 28px; height: 28px;
            background: #FFE066;
            border-radius: 50%;
            top: 8px; right: 14px;
            box-shadow: 0 0 12px rgba(255,220,80,0.5);
        }

        /* Tree/leaves at window bottom */
        .window-leaves {
            position: absolute;
            bottom: 0; left: 50%; transform: translateX(-50%);
            font-size: 2rem;
            line-height: 1;
        }

        /* Window sill */
        .window-sill {
            background: #C4956A;
            height: 10px;
            border-radius: 0 0 6px 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 14px 12px 0;
        }

        .sill-plant { font-size: 1.15rem; line-height: 1; margin-top: -8px; }

        /* ── Curtains ── */
        .curtain {
            position: absolute;
            top: 22px;
            width: 38px;
            height: 175px;
            z-index: 3;
        }
        .curtain-left { left: calc(50% - 89px - 38px); }
        .curtain-right { right: calc(50% - 89px - 38px); }
        .curtain-inner {
            width: 100%;
            height: 100%;
            border-radius: 0 0 50% 50%;
            opacity: 0.9;
        }
        .curtain-left .curtain-inner {
            background: linear-gradient(to right, #F5C9D6, #FAE8EF);
            border-radius: 0 0 80% 20%;
        }
        .curtain-right .curtain-inner {
            background: linear-gradient(to left, #F5C9D6, #FAE8EF);
            border-radius: 0 0 20% 80%;
        }
        .curtain-tie {
            position: absolute;
            width: 14px; height: 14px;
            background: var(--pink);
            border-radius: 50%;
            top: 60px;
        }
        .curtain-left .curtain-tie { right: -4px; }
        .curtain-right .curtain-tie { left: -4px; }

        /* ── Bookshelves ── */
        .shelf {
            position: absolute;
            bottom: 0;
            width: 118px;
            z-index: 5;
        }
        .shelf-left { left: 16px; }
        .shelf-right { right: 16px; }

        .shelf-unit {
            background: #C4956A;
            border-radius: 4px 4px 0 0;
            padding: 6px 6px 0;
            box-shadow: 3px 0 10px rgba(74,48,64,0.1), -3px 0 10px rgba(74,48,64,0.05);
        }

        .shelf-row {
            position: relative;
            height: 58px;
            background: #F9EDD8;
            border-radius: 2px;
            margin-bottom: 6px;
            display: flex;
            align-items: flex-end;
            padding: 4px 5px 0;
            gap: 2px;
            overflow: hidden;
            border-bottom: 4px solid #C4956A;
        }

        .mini-book {
            flex-shrink: 0;
            border-radius: 1px 2px 2px 1px;
            align-self: flex-end;
        }

        .shelf-deco { display: none; }

        /* ── Floor plants (CSS-drawn) ── */
        .floor-plant {
            position: absolute;
            bottom: 0;
            z-index: 4;
            display: flex; flex-direction: column; align-items: center;
        }
        .floor-plant-left { left: 146px; }
        .floor-plant-right { right: 146px; }
        .fp-leaves { display: flex; align-items: flex-end; gap: 2px; }
        .fp-leaf { background: #6DB87A; border-radius: 50%; }
        .fp-leaf-c { width: 26px; height: 34px; }
        .fp-leaf-s { width: 17px; height: 24px; margin-bottom: 4px; }
        .fp-rim { background: #B08050; height: 4px; border-radius: 2px; width: 36px; }
        .fp-pot { width: 30px; height: 20px; background: #C4956A; border-radius: 0 0 6px 6px; }

        /* ── Small table (treats) ── */
        .treat-table {
            position: absolute;
            bottom: 0;
            right: 150px;
            z-index: 6;
            width: 70px;
        }
        .table-top {
            background: #C4956A;
            height: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(74,48,64,0.15);
        }
        .table-legs {
            display: flex;
            justify-content: space-between;
            padding: 0 8px;
        }
        .table-leg {
            width: 6px;
            height: 36px;
            background: #B08050;
            border-radius: 0 0 3px 3px;
        }
        .table-items {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2px;
            white-space: nowrap;
            font-size: 1.1rem;
        }

        /* ── Rug ── */
        .rug {
            position: absolute;
            bottom: 12px;
            left: 50%; transform: translateX(-50%);
            width: 200px; height: 36px;
            background: radial-gradient(ellipse, #F5C9D6 60%, #FAE8EF 100%);
            border-radius: 50%;
            z-index: 3;
            border: 3px solid var(--pink-light);
        }


        /* ── Mochi bunny ── */
        .mochi-wrap {
            position: absolute;
            bottom: 0px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .speech-bubble {
            background: #fff;
            border: 2px solid var(--pink-light);
            border-radius: 16px;
            padding: 8px 14px;
            font-size: 0.78rem;
            color: var(--text);
            text-align: center;
            max-width: 190px;
            line-height: 1.5;
            box-shadow: 0 4px 16px rgba(74,48,64,0.1);
            margin-bottom: 8px;
            position: relative;
            font-weight: 600;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%; transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: var(--pink-light);
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%; transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #fff;
            z-index: 1;
        }

        /* Bunny */
        .bunny {
            position: relative;
            width: 98px;
            animation: bunny-breathe 3.5s ease-in-out infinite;
        }
        @keyframes bunny-breathe {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .bunny-ears {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: -10px;
        }

        .ear {
            width: 24px; height: 52px;
            background: #FFF5F8;
            border-radius: 12px 12px 10px 10px;
            position: relative;
            box-shadow: inset 0 0 0 2px #FADADD;
        }
        .ear-left { transform: rotate(-12deg); }
        .ear-right { transform: rotate(12deg); }
        .ear-inner {
            position: absolute;
            width: 10px; height: 30px;
            background: var(--pink-light);
            border-radius: 5px;
            top: 12px;
            left: 50%; transform: translateX(-50%);
        }

        .bunny-head {
            width: 88px; height: 80px;
            background: #FFF5F8;
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            box-shadow: 0 4px 16px rgba(74,48,64,0.1);
        }

        .eye {
            position: absolute;
            width: 10px; height: 10px;
            background: #3A2030;
            border-radius: 50%;
            top: 32px;
            transition: all 0.4s;
        }
        .eye::after {
            content: '';
            position: absolute;
            width: 3px; height: 3px;
            background: #fff;
            border-radius: 50%;
            top: 1px; left: 2px;
        }
        .eye-left { left: 18px; }
        .eye-right { right: 18px; }

        .cheek {
            position: absolute;
            width: 20px; height: 11px;
            background: var(--pink-light);
            border-radius: 50%;
            top: 46px;
            opacity: 0.65;
        }
        .cheek-left { left: 8px; }
        .cheek-right { right: 8px; }

        .nose {
            position: absolute;
            width: 8px; height: 5px;
            background: var(--pink);
            border-radius: 50%;
            top: 42px;
            left: 50%; transform: translateX(-50%);
        }

        .mouth {
            position: absolute;
            width: 16px; height: 8px;
            border-bottom: 2.5px solid #E8A0B4;
            border-radius: 0 0 8px 8px;
            top: 51px;
            left: 50%; transform: translateX(-50%);
        }

        .bunny-body {
            width: 78px; height: 64px;
            background: #FFF5F8;
            border-radius: 38px 38px 32px 32px;
            margin: -6px auto 0;
            position: relative;
            box-shadow: 0 4px 16px rgba(74,48,64,0.08);
        }

        .tummy {
            position: absolute;
            width: 42px; height: 38px;
            background: rgba(255,240,248,0.9);
            border-radius: 50%;
            top: 10px; left: 50%; transform: translateX(-50%);
        }

        .paw {
            position: absolute;
            width: 22px; height: 14px;
            background: #FFF5F8;
            border-radius: 50%;
            bottom: 0;
            box-shadow: 0 2px 6px rgba(74,48,64,0.08);
        }
        .paw-left { left: 2px; }
        .paw-right { right: 2px; }

        /* ── Mood expressions ── */
        .bunny[data-mood="sleepy"] .eye { height: 4px; border-radius: 4px; top: 35px; }
        .bunny[data-mood="sleepy"] .mouth { width: 10px; border-radius: 0 0 5px 5px; }
        .bunny[data-mood="excited"] .eye { width: 12px; height: 12px; top: 30px; }
        .bunny[data-mood="excited"] .cheek { opacity: 0.9; }
        .bunny[data-mood="hungry"] .mouth {
            width: 12px; height: 6px;
            border-bottom: none;
            border-top: 2.5px solid #E8A0B4;
            border-radius: 8px 8px 0 0;
            top: 54px;
        }

        /* ── Stats cards ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-top: 20px;
        }

        .stat-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 18px;
            padding: 18px 16px;
            text-align: center;
        }

        .stat-card-icon { font-size: 1.8rem; display: block; margin-bottom: 8px; }
        .stat-card-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .stat-card-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--pink-deep);
        }
        .stat-card-sub {
            font-size: 0.74rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .now-reading-card {
            grid-column: 1 / -1;
            background: var(--pink-soft);
            border-color: var(--pink-light);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
        }
        .now-reading-cover {
            width: 42px; height: 62px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--pink-light);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .now-reading-info .label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .now-reading-info .book-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }
        .now-reading-info .book-author {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .mood-badge {
            display: inline-block;
            background: var(--pink-soft);
            border: 1.5px solid var(--pink-light);
            border-radius: 100px;
            padding: 4px 12px;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--pink-deep);
            margin-top: 8px;
        }

        /* ── Window foliage (CSS) ── */
        .window-foliage {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            display: flex; align-items: flex-end; gap: 2px; z-index: 1;
        }
        .win-leaf { background: #6DB87A; border-radius: 50%; }
        .win-leaf-c { width: 20px; height: 24px; }
        .win-leaf-s { width: 13px; height: 17px; }

        /* ── Sill pots (CSS) ── */
        .sill-pot { display: inline-flex; flex-direction: column; align-items: center; margin-top: -8px; }
        .sp-leaves { background: #6DB87A; border-radius: 50%; }
        .sp-leaves-sm { width: 13px; height: 11px; }
        .sp-leaves-md { width: 17px; height: 14px; }
        .sp-rim { background: #B08050; height: 2px; border-radius: 1px; width: 100%; }
        .sp-pot-sm { width: 11px; height: 8px; background: #C4956A; border-radius: 0 0 3px 3px; }
        .sp-pot-md { width: 14px; height: 10px; background: #C4956A; border-radius: 0 0 3px 3px; }


        /* ── Responsive ── */
        @media (max-width: 600px) {
            header { padding: 14px 18px; }
            nav a { padding: 6px 10px; font-size: 0.8rem; }
            .pet-page { padding: 28px 16px 80px; }
            .room-wall { height: 280px; }
            .room-floor { height: 60px; }
            .shelf { width: 88px; }
            .shelf-row { height: 44px; }
            .window { width: 130px; }
            .window-glass { height: 104px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .now-reading-card { grid-column: 1 / -1; }
            .curtain { width: 28px; height: 136px; }
            .curtain-left { left: calc(50% - 65px - 28px); }
            .curtain-right { right: calc(50% - 65px - 28px); }
            .floor-plant-left { left: 100px; }
            .floor-plant-right { right: 100px; }
            .fp-leaf-c { width: 20px; height: 26px; }
            .fp-leaf-s { width: 13px; height: 18px; }
            .fp-rim { width: 28px; }
            .fp-pot { width: 23px; height: 15px; }
            .treat-table { right: 100px; }
            .wall-frame { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <span class="logo-bunny">🐰</span>
        <span class="logo-wordmark">Mochi</span>
    </div>
    <nav>
        <a href="shelf.html">My Shelf</a>
        <a href="discover.html">Discover</a>
        <a href="pet.html" class="active">My Pet</a>
        <a href="wrapped.html">Wrapped</a>
    </nav>
</header>

<div class="pet-page">

    <div class="page-heading">
        <h1>Mochi's <em>little room.</em></h1>
        <p id="pageSubtitle">She's waiting for you 🌸</p>
    </div>

    <!-- ── Room Scene ── -->
    <div class="room-scene">
        <div class="room-wall">

            <!-- Window -->
            <div class="window">
                <div class="window-frame">
                    <div class="window-glass">
                        <div class="window-sky">
                            <div class="sun"></div>
                            <div class="cloud cloud-1"></div>
                            <div class="cloud cloud-2"></div>
                            <div class="cloud cloud-3"></div>
                            <div class="window-foliage">
                                <div class="win-leaf win-leaf-s"></div>
                                <div class="win-leaf win-leaf-c"></div>
                                <div class="win-leaf win-leaf-s"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="window-sill">
                    <div class="sill-pot"><div class="sp-leaves sp-leaves-sm"></div><div class="sp-rim"></div><div class="sp-pot-sm"></div></div>
                    <div class="sill-pot"><div class="sp-leaves sp-leaves-md"></div><div class="sp-rim"></div><div class="sp-pot-md"></div></div>
                    <div class="sill-pot"><div class="sp-leaves sp-leaves-sm"></div><div class="sp-rim"></div><div class="sp-pot-sm"></div></div>
                </div>
            </div>

            <!-- Curtains -->
            <div class="curtain curtain-left">
                <div class="curtain-inner"></div>
                <div class="curtain-tie"></div>
            </div>
            <div class="curtain curtain-right">
                <div class="curtain-inner"></div>
                <div class="curtain-tie"></div>
            </div>

            <!-- Wall frames -->

            <!-- Left shelf -->
            <div class="shelf shelf-left">
                <div class="shelf-unit">
                    <div class="shelf-row" id="shelfRowL1"></div>
                    <div class="shelf-row" id="shelfRowL2"></div>
                </div>
            </div>

            <!-- Right shelf -->
            <div class="shelf shelf-right">
                <div class="shelf-unit">
                    <div class="shelf-row" id="shelfRowR1"></div>
                    <div class="shelf-row" id="shelfRowR2"></div>
                </div>
            </div>

            <!-- Floor plants -->
            <div class="floor-plant floor-plant-left">
                <div class="fp-leaves"><div class="fp-leaf fp-leaf-s"></div><div class="fp-leaf fp-leaf-c"></div><div class="fp-leaf fp-leaf-s"></div></div>
                <div class="fp-rim"></div>
                <div class="fp-pot"></div>
            </div>
            <div class="floor-plant floor-plant-right">
                <div class="fp-leaves"><div class="fp-leaf fp-leaf-s"></div><div class="fp-leaf fp-leaf-c"></div><div class="fp-leaf fp-leaf-s"></div></div>
                <div class="fp-rim"></div>
                <div class="fp-pot"></div>
            </div>

            <!-- Treat table -->
            <div class="treat-table">
                <div class="table-items" id="treatItems"></div>
                <div class="table-top"></div>
                <div class="table-legs">
                    <div class="table-leg"></div>
                    <div class="table-leg"></div>
                </div>
            </div>

            <!-- Rug -->
            <div class="rug"></div>

            <!-- Mochi -->
            <div class="mochi-wrap">
                <div class="speech-bubble" id="speechBubble">Loading...</div>
                <div class="bunny" id="mochiCharacter" data-mood="happy">
                    <div class="bunny-ears">
                        <div class="ear ear-left"><div class="ear-inner"></div></div>
                        <div class="ear ear-right"><div class="ear-inner"></div></div>
                    </div>
                    <div class="bunny-head">
                        <div class="eye eye-left"></div>
                        <div class="eye eye-right"></div>
                        <div class="cheek cheek-left"></div>
                        <div class="cheek cheek-right"></div>
                        <div class="nose"></div>
                        <div class="mouth"></div>
                    </div>
                    <div class="bunny-body">
                        <div class="tummy"></div>
                        <div class="paw paw-left"></div>
                        <div class="paw paw-right"></div>
                    </div>
                </div>
            </div>

        </div>
        <div class="room-floor"></div>
    </div>

    <!-- ── Stats ── -->
    <div class="stats-grid" id="statsGrid">

        <div class="stat-card">
            <span class="stat-card-icon">📚</span>
            <div class="stat-card-label">Books read</div>
            <div class="stat-card-value" id="statRead">—</div>
            <div class="stat-card-sub">on your shelf</div>
        </div>

        <div class="stat-card">
            <span class="stat-card-icon">🧁</span>
            <div class="stat-card-label">Treats earned</div>
            <div class="stat-card-value" id="statTreats">—</div>
            <div class="stat-card-sub" id="statTreatsSub">from finished books</div>
        </div>

        <div class="stat-card">
            <span class="stat-card-icon" id="moodIcon">🌸</span>
            <div class="stat-card-label">Mochi's mood</div>
            <div class="stat-card-value" id="statMoodLabel" style="font-size:1rem">—</div>
            <div class="mood-badge" id="statMoodBadge">Loading...</div>
        </div>

        <div class="now-reading-card stat-card" id="nowReadingCard" style="display:none">
            <div class="now-reading-cover" id="nowReadingCover">📖</div>
            <div class="now-reading-info">
                <div class="label">Currently reading</div>
                <div class="book-title" id="nowReadingTitle">—</div>
                <div class="book-author" id="nowReadingAuthor">—</div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="mochi.js"></script>
<script>
function getBooks() { return window.mochiGetBooks(); }

// ── Mini books for shelves ──
const BOOK_SPINE_COLORS = [
    '#E8A0B4','#C97A8E','#A8C5E8','#8BC5B8','#E8C5A0',
    '#B8A8E8','#E8D0A0','#C5A8D4','#A0C5B8','#D4C5A0',
    '#F0B8C8','#B8D4C5','#C8B8E8','#E8C8B8','#B8C8E8',
];

function makeMiniBook(colorIdx, height) {
    const div = document.createElement('div');
    div.className = 'mini-book';
    const h = height || (38 + Math.floor(Math.random() * 16));
    const w = 10 + Math.floor(Math.random() * 5);
    div.style.cssText = `
        width:${w}px; height:${h}px;
        background:${BOOK_SPINE_COLORS[colorIdx % BOOK_SPINE_COLORS.length]};
        border-radius:1px 2px 2px 1px;
        flex-shrink:0;
    `;
    return div;
}

function populateShelves(books) {
    const rows = ['shelfRowL1','shelfRowL2','shelfRowR1','shelfRowR2'];
    const perRow = 7;
    let bookIdx = 0;

    // Fill with real books first, then decorative fillers
    const totalSlots = rows.length * perRow;
    const colorSequence = books.map((_, i) => i);

    // Pad with filler colors if fewer books than slots
    while (colorSequence.length < totalSlots) {
        colorSequence.push(colorSequence.length);
    }

    rows.forEach((rowId, rowIdx) => {
        const row = document.getElementById(rowId);
        if (!row) return;
        for (let i = 0; i < perRow; i++) {
            const book = books[bookIdx] || null;
            const colorIdx = colorSequence[bookIdx] || (bookIdx * 3);
            const mini = makeMiniBook(colorIdx);
            // Real books are slightly taller
            if (book) mini.style.height = (44 + Math.floor(Math.random() * 12)) + 'px';
            row.appendChild(mini);
            bookIdx++;
        }
    });
}

// ── Mood system ──
const MOODS = {
    excited: {
        key: 'excited',
        label: 'Excited',
        icon: '✨',
        badge: '✨ On a roll!',
        messages: [
            "You finished a 5-star book! I'm so proud of you 🧁",
            "Bestie that book was AMAZING wasn't it 🌟",
            "Five stars! You have such good taste 🍰",
        ]
    },
    cozy: {
        key: 'cozy',
        label: 'Cozy',
        icon: '🧁',
        badge: '🧁 Living her best life',
        messages: [
            "This is my happy place 🧁 Keep reading!",
            "So many books, so cozy 🌸 You're doing amazing.",
            "I made us both a cupcake to celebrate 🧁✨",
        ]
    },
    happy: {
        key: 'happy',
        label: 'Happy',
        icon: '🌸',
        badge: '🌸 Happy & content',
        messages: [
            "Reading makes everything sweeter 🍰",
            "Hi bestie! What are we reading today? 📖",
            "Your shelf is looking so cute 🌸",
        ]
    },
    reading: {
        key: 'reading',
        label: 'Focused',
        icon: '📖',
        badge: '📖 Rooting for you',
        messages: [
            "Ooh, we're reading! I love this for us 📖",
            "Don't mind me, just cheering you on 🐰✨",
            "I'll have a cupcake ready for when you finish 🧁",
        ]
    },
    sleepy: {
        key: 'sleepy',
        label: 'Sleepy',
        icon: '💤',
        badge: '💤 Waiting for you',
        messages: [
            "Zzzz... wake me when you pick up a book 💤",
            "I'm just napping until you start reading again 🐰",
            "A little rest... but I miss reading with you 🌙",
        ]
    },
    hungry: {
        key: 'hungry',
        label: 'Hungry',
        icon: '🍰',
        badge: '🍰 Feed me books!',
        messages: [
            "I'd love a cupcake... maybe add a book first? 🧁",
            "Your shelf is empty! Let's fix that together 📚",
            "No books yet? I believe in you! Start here 🌸",
        ]
    },
};

function getMood(books) {
    if (books.length === 0) return MOODS.hungry;
    const thisYear = new Date().getFullYear();
    const read = books.filter(b => {
        if (b.status !== 'read') return false;
        const ts = b.dateFinished || b.dateAdded;
        return ts && new Date(ts).getFullYear() === thisYear;
    });
    const reading = books.filter(b => b.status === 'reading');
    const fiveStars = read.filter(b => b.rating === 5);

    if (fiveStars.length > 0 && fiveStars.length === read.length && read.length > 0) return MOODS.excited;
    if (read.length >= 5 && reading.length > 0) return MOODS.cozy;
    if (reading.length > 0) return MOODS.reading;
    if (read.length > 0) return MOODS.happy;
    return MOODS.sleepy;
}

function randomMessage(mood) {
    const msgs = mood.messages;
    return msgs[Math.floor(Math.random() * msgs.length)];
}

// ── Treats ──
function renderTreats(read, fiveStars) {
    const el = document.getElementById('treatItems');
    const cupcakes = Math.min(read + fiveStars, 5);
    el.textContent = cupcakes > 0 ? '🧁'.repeat(cupcakes) : '';
}

// ── Now reading ──
async function showNowReading(book) {
    const card = document.getElementById('nowReadingCard');
    if (!book) { card.style.display = 'none'; return; }
    card.style.display = 'flex';
    document.getElementById('nowReadingTitle').textContent = book.title;
    document.getElementById('nowReadingAuthor').textContent = book.author;

    const coverEl = document.getElementById('nowReadingCover');
    if (book.coverId) {
        const img = document.createElement('img');
        img.className = 'now-reading-cover';
        img.src = `https://covers.openlibrary.org/b/id/${book.coverId}-M.jpg`;
        img.alt = book.title;
        img.style.cssText = 'width:42px;height:62px;border-radius:6px;object-fit:cover;flex-shrink:0;';
        img.onerror = () => { img.textContent = '📖'; };
        coverEl.replaceWith(img);
    } else {
        try {
            const q = encodeURIComponent(`${book.title} ${book.author}`);
            const res = await fetch(`https://openlibrary.org/search.json?q=${q}&limit=1&fields=cover_i`);
            const data = await res.json();
            if (data.docs?.[0]?.cover_i) {
                const img = document.createElement('img');
                img.className = 'now-reading-cover';
                img.src = `https://covers.openlibrary.org/b/id/${data.docs[0].cover_i}-M.jpg`;
                img.alt = book.title;
                img.style.cssText = 'width:42px;height:62px;border-radius:6px;object-fit:cover;flex-shrink:0;';
                coverEl.replaceWith(img);
            }
        } catch (_) {}
    }
}

// ── Init ──
function init() {
    const books = getBooks();
    const thisYear = new Date().getFullYear();
    const read = books.filter(b => {
        if (b.status !== 'read') return false;
        const ts = b.dateFinished || b.dateAdded;
        return ts && new Date(ts).getFullYear() === thisYear;
    });
    const fiveStars = read.filter(b => b.rating === 5);
    const reading = books.filter(b => b.status === 'reading');
    const mood = getMood(books);

    // Character mood
    document.getElementById('mochiCharacter').dataset.mood = mood.key;

    // Speech bubble
    document.getElementById('speechBubble').textContent = randomMessage(mood);

    // Subtitle
    const subtitles = {
        excited: "She's doing a little happy dance 🌟",
        cozy: "Living her coziest life 🧁",
        happy: "She's happy to see you 🌸",
        reading: "Rooting for you, bestie 📖",
        sleepy: "Shhh... she's napping 💤",
        hungry: "She needs some books! 🧁",
    };
    document.getElementById('pageSubtitle').textContent = subtitles[mood.key];

    // Stats
    document.getElementById('statRead').textContent = read.length;
    document.getElementById('statTreats').textContent = read.length + fiveStars.length;
    document.getElementById('statTreatsSub').textContent = 'cupcakes earned 🧁';
    document.getElementById('statMoodLabel').textContent = mood.label;
    document.getElementById('statMoodBadge').textContent = mood.badge;
    document.getElementById('moodIcon').textContent = mood.icon;

    // Shelves
    populateShelves(books);

    // Treats on table
    renderTreats(read.length, fiveStars.length);

    // Now reading
    showNowReading(reading[0] || null);
}

window.initMochi(() => init());
</script>

</body>
</html>
